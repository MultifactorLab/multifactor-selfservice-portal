name: Release Docker Image to GHCR

on:
  release:
    types: [published]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: github.event.release.prerelease == false
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: 🐳 Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract version and date
        id: meta
        run: |
          VERSION=${{ github.event.release.tag_name }}
          VERSION=${VERSION#v}
          
          BUILD_DATE=$(date +%Y-%m-%d)
          
          CREATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT
          echo "repo_lower=$REPO_LOWER" >> $GITHUB_OUTPUT
          
          echo "📦 Version: $VERSION"
          echo "📅 Build Date: $BUILD_DATE"
          echo "🕐 Created: $CREATED"
          echo "🏷️  Repository (lowercase): $REPO_LOWER"

      - name: 📝 Generate Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM mcr.microsoft.com/dotnet/aspnet:8.0
          
          # Build arguments
          ARG VERSION
          ARG BUILD_DATE
          ARG CREATED
          
          # Labels
          LABEL org.opencontainers.image.version=$VERSION
          LABEL org.opencontainers.image.created=$CREATED
          LABEL org.opencontainers.image.title="Multifactor Self-Service Portal"
          LABEL org.opencontainers.image.description="Self-service portal for multifactor authentication"
          LABEL org.opencontainers.image.source="https://github.com/MultifactorLab/multifactor-selfservice-portal"
          LABEL org.opencontainers.image.build-date=$BUILD_DATE
          
          RUN adduser --disabled-password --home /ssp --gecos '' ssp \
          && chown -R ssp /ssp
          RUN apt update && apt install -y curl libldap-2.5-0 libldap-common ldap-utils openssl \
          && ln -s /usr/lib/x86_64-linux-gnu/libldap-2.5.so.0 /ssp/libldap.so.2 \
          && update-ca-certificates
          ENV LD_LIBRARY_PATH="/lib:/usr/lib:/usr/lib/x86_64-linux-gnu"
          ENV ASPNETCORE_ENVIRONMENT="production"
          WORKDIR /ssp
          COPY . ./
          RUN chown -R ssp /ssp
          USER ssp
          ENTRYPOINT ["dotnet", "MultiFactor.SelfService.Linux.Portal.dll"]
          EOF
          
          echo "✅ Dockerfile generated"

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.meta.outputs.repo_lower }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.meta.outputs.repo_lower }}:latest
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
            CREATED=${{ steps.meta.outputs.created }}
          labels: |
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
            org.opencontainers.image.created=${{ steps.meta.outputs.created }}
            org.opencontainers.image.title=${{ github.event.repository.name }}
            org.opencontainers.image.description=${{ github.event.release.body }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Update release with Docker info
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ${{ github.event.release.body }}
            
            ---
            
            ## 🐳 Docker Image
            
            **Image:** `ghcr.io/${{ steps.meta.outputs.repo_lower }}:${{ steps.meta.outputs.version }}`
            
            ### 🚀 Quick start:
            
            ```bash
            docker pull ghcr.io/${{ steps.meta.outputs.repo_lower }}:${{ steps.meta.outputs.version }}
            ```
            
            ### 📊 Build info:
            
            - **Version:** ${{ steps.meta.outputs.version }}
            - **Build Date:** ${{ steps.meta.outputs.build_date }}
            - **Created:** ${{ steps.meta.outputs.created }}
            
            ### 🏷️ Available tags:
            
            - `ghcr.io/${{ steps.meta.outputs.repo_lower }}:${{ steps.meta.outputs.version }}` - конкретная версия
            - `ghcr.io/${{ steps.meta.outputs.repo_lower }}:latest` - последняя стабильная версия
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Success notification
        run: |
          echo "🎉 Docker image successfully built and pushed!"
          echo "📦 Image: ghcr.io/${{ steps.meta.outputs.repo_lower }}:${{ steps.meta.outputs.version }}"
          echo "📅 Build Date: ${{ steps.meta.outputs.build_date }}"
